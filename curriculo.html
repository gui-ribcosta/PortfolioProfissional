<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <!-- CONFIGURAÇÕES -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Currículo | Guilherme Ribeiro</title>
  <meta name="referrer" content="strict-origin-when-cross-origin">

  <!-- ESTILOS -->
  <link rel="stylesheet" href="styles/global.css">
  <link rel="stylesheet" href="styles/pages.css">

  <!-- FONT AWESOME -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw=="
    crossorigin="anonymous" referrerpolicy="no-referrer">

</head>

<body class="curriculo-body">

  <!-- ================= HEADER FIXO ================= -->
  <header class="curriculo-header">

    <!-- Botão Voltar -->
    <a href="index.html" class="back-link" data-i18n="btn_voltar"><i class="fa-solid fa-angle-left"></i>
      Voltar ao Site
    </a>

    <!-- Título -->
    <div class="header-center">
      <p class="curriculo-subtitle" data-i18n="cv_subtitle">
        Versão resumida para visualização rápida.
      </p>
    </div>

    <!-- Direita: Download + Idioma -->
    <div class="curriculo-header-right">
      <a
        id="downloadBtn"
        href="assets/files/Currículo_Guilherme_Tecnologia.pdf"
        download
        class="btn-download"
        data-i18n="cv_download"
        data-pdf-pt="assets/files/Currículo_Guilherme_Tecnologia.pdf"
        data-pdf-en="assets/files/Resume_Guilherme_Technology.pdf"
      ><i class="fa-solid fa-download"></i> BAIXAR PDF
      </a>

      <!-- Botão de Idioma -->
      <button class="icon-btn curriculo-lang-btn" id="langToggle" aria-label="Toggle language">
        <i class="fa-solid fa-language"></i>
        <span class="icon-tooltip">TRANSLATE TO ENGLISH</span>
      </button>
    </div>

  </header>

  <!-- ================= CONTEÚDO ================= -->
  <main class="curriculo-wrapper">

    <div class="pdf-viewer-card">
      <iframe
        id="pdfViewer"
        class="pdf-iframe"
        src="assets/files/Currículo_Guilherme_Tecnologia.pdf"
        title="Currículo Guilherme Ribeiro"
        data-pdf-pt="assets/files/Currículo_Guilherme_Tecnologia.pdf"
        data-pdf-en="assets/files/Resume_Guilherme_Technology.pdf"
        allowfullscreen
      ></iframe>
    </div>

  </main>

  <script src="scripts/translations.js"></script>
  <script src="scripts/i18n.js"></script>

  <!-- Troca o PDF ao alternar idioma -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const langToggle = document.getElementById('langToggle');
      const pdfViewer  = document.getElementById('pdfViewer');
      const downloadBtn = document.getElementById('downloadBtn');

      function applyPdf(lang) {
        const attr = lang === 'en' ? 'data-pdf-en' : 'data-pdf-pt';
        const ptSrc = pdfViewer.getAttribute('data-pdf-pt');
        const enSrc = pdfViewer.getAttribute('data-pdf-en');

        const src = lang === 'en' ? enSrc : ptSrc;

        // Só troca se o arquivo de destino existir (evita iframe em branco)
        pdfViewer.src  = src;
        downloadBtn.href = src;
        // Atualiza o nome do arquivo no download
        downloadBtn.download = src.split('/').pop();
      }

      // Aplica no carregamento conforme idioma salvo
      const savedLang = localStorage.getItem('lang') || 'pt-BR';
      applyPdf(savedLang);

      // Escuta o clique no botão de idioma
      if (langToggle) {
        langToggle.addEventListener('click', () => {
          // O i18n.js já atualizou o localStorage antes desse listener
          // mas como a ordem de execução pode variar, lemos após um tick
          setTimeout(() => {
            const currentLang = localStorage.getItem('lang') || 'pt-BR';
            applyPdf(currentLang);
          }, 50);
        });
      }
    });
  </script>
</body>

</html>
